
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>business blog card</title>
        
        <link rel="stylesheet" href="styles.css">
    </head>



    <body>

        <main>

            <section class="card">
                
                <div class="card-image">

                    <img src="imgs\hero-image-1.webp" alt="Placeholder Image" class="main-image">
                    <img src="imgs\white-overlay.svg" alt="overlay" class="overlay-image">
                </div>


                <div class="card-content">
                    <h1 class="card-title">Perfect solution for small businesses</h1>
                    <p class="card-description">Small businesses need to generate leads to grow.</p>
                    <p class="card-description">You can use tools like Ringy</p>
                </div>

                <div class="card-author">

                    <div class="card-author-avatar">
                        <img src="imgs\avatar-image-business-card.webp" alt="Author Avatar" class="author-avatar">
                    </div>

                    <div class="card-author-info">
                         <h3>Amy Burguess</h3>
                         <p>Customer Manager, Solution</p>
                    </div>

                </div>





            </section>
        </main>


    </body>





</html>
